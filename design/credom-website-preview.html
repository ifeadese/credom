document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

hat makes you unmissable.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#2B2724; color:#FAF7F2; padding:38px 34px; border-radius:3px; min-height:220px; display:flex; flex-direction:column; justify-content:space-between;\"><span style=\"font-family:'Rokkitt'; font-weight:700; font-size:22px; color:#D89A2E;\">06<\u002Fspan><div><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:26px; margin:0 0 10px;\">Digital Marketing<\u002Fh3><p style=\"font-size:15px; line-height:1.6; margin:0; color:#C9C0B6;\">Turning online attention into engagement, leads and sales.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- MOST MARKETING IS IGNORED -->\n      <section style=\"background:#D89A2E; color:#FAF7F2; padding:clamp(80px,11vw,140px) 0; overflow:hidden;\">\n        <div style=\"max-width:1240px; margin:0 auto; padding:0 40px; display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:50px; align-items:center;\">\n          <h2 style=\"font-family:'Rokkitt'; font-weight:800; font-size:clamp(48px,7vw,96px); line-height:0.94; letter-spacing:-0.01em; margin:0; color:#FFFFFF;\">Most<br>Marketing<br>Is Ignored.<\u002Fh2>\n          <div style=\"max-width:440px;\">\n            <p style=\"font-size:19px; line-height:1.7; color:#FBEFDB; margin:0 0 22px;\">Consumers scroll past ads. Skip commercials. Forget campaigns.<\u002Fp>\n            <p style=\"font-size:19px; line-height:1.7; color:#FFFFFF; font-weight:600; margin:0;\">But experiences? Experiences create emotion, conversation, and memory. Brands that win today don't just market to people. They involve them.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- HOW WE WORK -->\n      <section style=\"max-width:1240px; margin:0 auto; padding:clamp(80px,10vw,120px) 40px;\">\n        <div style=\"margin-bottom:52px; max-width:720px;\">\n          <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#B87D1E; margin-bottom:14px;\">Our Process — 4D1M<\u002Fspan>\n          <h2 style=\"font-family:'Rokkitt'; font-weight:700; font-size:clamp(38px,5vw,64px); line-height:1; letter-spacing:-0.01em; margin:0 0 20px; color:#201D1B;\">How We Work<\u002Fh2>\n          <p style=\"font-size:18px; line-height:1.7; color:#6E665F; margin:0;\">Great experiences don't happen by chance. Every campaign follows an intentional yet flexible process that takes ideas from insight to full-spectrum results.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:2px;\">\n          <div style=\"background:#201D1B; color:#FAF7F2; padding:30px 38px; display:grid; grid-template-columns:200px 1fr; gap:24px; align-items:center;\"><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:30px; margin:0;\">Discover<\u002Fh3><p style=\"font-size:16px; line-height:1.65; margin:0; color:#C9C0B6;\">We dive deep into your brand, audience, objectives, and media environment. Before any concept is sketched, we understand what success looks and feels like.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#201D1B; color:#FAF7F2; padding:30px 38px; display:grid; grid-template-columns:200px 1fr; gap:24px; align-items:center;\"><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:30px; margin:0;\">Design<\u002Fh3><p style=\"font-size:16px; line-height:1.65; margin:0; color:#C9C0B6;\">We develop bold, insight-led concepts and immersive integrated experience strategies that connect your brand story across all channels.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#201D1B; color:#FAF7F2; padding:30px 38px; display:grid; grid-template-columns:200px 1fr; gap:24px; align-items:center;\"><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:30px; margin:0;\">Develop<\u002Fh3><p style=\"font-size:16px; line-height:1.65; margin:0; color:#C9C0B6;\">We plan every detail from logistics and production to media scheduling and site selection, ensuring every channel is deployed with precision.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#201D1B; color:#FAF7F2; padding:30px 38px; display:grid; grid-template-columns:200px 1fr; gap:24px; align-items:center;\"><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:30px; margin:0;\">Deliver<\u002Fh3><p style=\"font-size:16px; line-height:1.65; margin:0; color:#C9C0B6;\">We execute every element end-to-end, bringing the campaign to life with the same standard of precision and excellence across every touchpoint.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#D89A2E; color:#201D1B; padding:30px 38px; display:grid; grid-template-columns:200px 1fr; gap:24px; align-items:center;\"><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:30px; margin:0;\">Measure<\u002Fh3><p style=\"font-size:16px; line-height:1.65; margin:0; opacity:0.85;\">We evaluate performance across every channel, quantifying reach, engagement and commercial impact to optimise for future growth.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- CLIENTS -->\n      <section style=\"background:#201D1B; color:#FAF7F2; padding:clamp(70px,8vw,100px) 0;\">\n        <div style=\"max-width:1240px; margin:0 auto; padding:0 40px;\">\n          <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#D89A2E; margin-bottom:38px; text-align:center;\">Brands We've Served<\u002Fspan>\n          <div style=\"display:flex; flex-wrap:wrap; gap:14px 48px; justify-content:center; align-items:center;\">\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Midea<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Visa<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">MTN<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Coca-Cola<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Guinness<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Reckitt<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Diageo<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Spotify<\u002Fspan>\n            <span style=\"font-family:'Rokkitt'; font-weight:600; font-size:clamp(20px,2.4vw,30px); color:#8A8079;\">Terra<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- CTA BAND -->\n      <section style=\"background:#F0EBE3; padding:clamp(80px,10vw,120px) 40px; text-align:center;\">\n        <div style=\"max-width:820px; margin:0 auto;\">\n          <h2 style=\"font-family:'Rokkitt'; font-weight:800; font-size:clamp(40px,6vw,80px); line-height:0.98; letter-spacing:-0.01em; margin:0 0 26px; color:#201D1B;\">Let's make something they'll remember.<\u002Fh2>\n          <a href=\"#\" onclick=\"{{ goContact }}\" style=\"display:inline-block; font-size:16px; font-weight:700; color:#201D1B; background:#D89A2E; padding:18px 40px; border-radius:2px;\">Schedule a Chat<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ==================== ABOUT ==================== -->\n    <sc-if value=\"{{ isAbout }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n\n      <!-- ABOUT HERO -->\n      <section style=\"max-width:1240px; margin:0 auto; padding:clamp(70px,9vw,120px) 40px clamp(50px,6vw,80px);\">\n        <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#B87D1E; margin-bottom:26px;\">About CREDOM<\u002Fspan>\n        <h1 style=\"font-family:'Rokkitt'; font-weight:800; font-size:clamp(56px,10vw,128px); line-height:0.9; letter-spacing:-0.015em; margin:0 0 40px; color:#201D1B;\">Bold.<br>Strategic.<br>Immersive.<\u002Fh1>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:40px; max-width:960px;\">\n          <p style=\"font-size:17px; line-height:1.75; color:#4A443D; margin:0;\">We are an integrated brand experience agency built to shape how people encounter, understand, and connect with brands across every touchpoint. We unify strategy, creativity, and execution to design the full arc of a brand's presence — from immersive live experiences and cultural activations to out-of-home and media channels that extend reach.<\u002Fp>\n          <p style=\"font-size:17px; line-height:1.75; color:#4A443D; margin:0;\">Every campaign is engineered with an insight-led strategy to resonate, inspire action, and leave a lasting imprint. We pair strategic rigour with creative excellence to ensure every brand interaction lands with precision and purpose.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- BELIEF QUOTE -->\n      <section style=\"max-width:1240px; margin:0 auto; padding:clamp(40px,6vw,70px) 40px clamp(70px,9vw,110px);\">\n        <p style=\"font-family:'Rokkitt'; font-style:italic; font-weight:600; font-size:clamp(30px,4.6vw,58px); line-height:1.14; letter-spacing:-0.01em; color:#D89A2E; max-width:960px; margin:0;\">We believe the most powerful brand experiences are not merely seen or attended, they are felt.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- VISION / MISSION -->\n      <section style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr));\">\n        <div style=\"background:#201D1B; color:#FAF7F2; padding:clamp(56px,7vw,90px) clamp(40px,5vw,70px);\">\n          <h2 style=\"font-family:'Rokkitt'; font-weight:700; font-size:clamp(34px,4vw,48px); color:#D89A2E; margin:0 0 22px;\">Vision<\u002Fh2>\n          <p style=\"font-size:20px; line-height:1.65; color:#E7DFD5; max-width:420px; margin:0;\">To redefine brand impact in Africa through immersive experiences.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#D89A2E; color:#201D1B; padding:clamp(56px,7vw,90px) clamp(40px,5vw,70px);\">\n          <h2 style=\"font-family:'Rokkitt'; font-weight:700; font-size:clamp(34px,4vw,48px); margin:0 0 22px;\">Mission<\u002Fh2>\n          <p style=\"font-size:18px; line-height:1.7; margin:0 0 16px; max-width:460px;\">Design and deliver integrated brand experiences that forge deep connections that drive engagement and generate measurable growth.<\u002Fp>\n          <p style=\"font-size:18px; line-height:1.7; margin:0; max-width:460px;\">Lead with creative excellence and strategic precision across every market that transcends Africa.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- WHAT WE STAND FOR -->\n      <section style=\"max-width:1240px; margin:0 auto; padding:clamp(80px,10vw,120px) 40px;\">\n        <div style=\"margin-bottom:52px; max-width:680px;\">\n          <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#B87D1E; margin-bottom:14px;\">Our Principles<\u002Fspan>\n          <h2 style=\"font-family:'Rokkitt'; font-weight:700; font-size:clamp(38px,5vw,64px); line-height:1; letter-spacing:-0.01em; margin:0 0 20px; color:#201D1B;\">What We Stand For<\u002Fh2>\n          <p style=\"font-size:18px; line-height:1.7; color:#6E665F; margin:0;\">Every brand has a story worth experiencing, not just telling. These are the five principles that govern how we think, work, and deliver.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:18px;\">\n          <div style=\"background:#C50E8B; color:#FAF7F2; padding:36px 32px; border-radius:3px;\"><span style=\"font-family:'Rokkitt'; font-weight:700; font-size:20px; opacity:0.6; display:block; margin-bottom:14px;\">01<\u002Fspan><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:24px; margin:0 0 12px;\">People-Centricity<\u002Fh3><p style=\"font-size:15px; line-height:1.65; margin:0; opacity:0.92;\">We design for humans first, brands second. Every experience starts with one question: how do we want people to feel?<\u002Fp><\u002Fdiv>\n          <div style=\"background:#5A2A17; color:#FAF7F2; padding:36px 32px; border-radius:3px;\"><span style=\"font-family:'Rokkitt'; font-weight:700; font-size:20px; color:#D89A2E; display:block; margin-bottom:14px;\">02<\u002Fspan><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:24px; margin:0 0 12px;\">Reliability &amp; Detail<\u002Fh3><p style=\"font-size:15px; line-height:1.65; margin:0; color:#E4D8CE;\">We do what we say, deliver on our promise, and sweat the small things so the big moments land exactly as they should.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#D89A2E; color:#201D1B; padding:36px 32px; border-radius:3px;\"><span style=\"font-family:'Rokkitt'; font-weight:700; font-size:20px; opacity:0.55; display:block; margin-bottom:14px;\">03<\u002Fspan><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:24px; margin:0 0 12px;\">Innovation<\u002Fh3><p style=\"font-size:15px; line-height:1.65; margin:0; opacity:0.88;\">Every brief is an invitation to push further. We challenge the expected and only settle when the idea is genuinely better.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#18827B; color:#FAF7F2; padding:36px 32px; border-radius:3px;\"><span style=\"font-family:'Rokkitt'; font-weight:700; font-size:20px; opacity:0.6; display:block; margin-bottom:14px;\">04<\u002Fspan><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:24px; margin:0 0 12px;\">Excellence<\u002Fh3><p style=\"font-size:15px; line-height:1.65; margin:0; opacity:0.92;\">We hold ourselves to a standard beyond delivery — every touchpoint, visible and invisible, reflects the full measure of our craft.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#FFFFFF; color:#201D1B; padding:36px 32px; border-radius:3px; border:1px solid #E4DDD2;\"><span style=\"font-family:'Rokkitt'; font-weight:700; font-size:20px; color:#D89A2E; display:block; margin-bottom:14px;\">05<\u002Fspan><h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:24px; margin:0 0 12px;\">Teamwork<\u002Fh3><p style=\"font-size:15px; line-height:1.65; margin:0; color:#6E665F;\">Behind every seamless campaign is a team working in precise coordination, internally and with our clients.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- MEET THE FORCE -->\n      <section style=\"background:#201D1B; color:#FAF7F2; padding:clamp(80px,10vw,120px) 0;\">\n        <div style=\"max-width:1240px; margin:0 auto; padding:0 40px;\">\n          <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#D89A2E; margin-bottom:14px;\">Meet the Force<\u002Fspan>\n          <h2 style=\"font-family:'Rokkitt'; font-weight:700; font-size:clamp(38px,5vw,64px); line-height:1; letter-spacing:-0.01em; margin:0 0 52px; color:#FAF7F2;\">The people behind the moments.<\u002Fh2>\n          <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:36px;\">\n            <div>\n              <div style=\"position:relative; margin-bottom:28px;\">\n                <div style=\"position:absolute; left:-14px; top:14px; width:200px; height:230px; background:#D89A2E; border-radius:2px;\"><\u002Fdiv>\n                <div style=\"position:relative; width:220px; height:250px; background:#2E2A25; border:1px solid #3A342E; display:flex; align-items:center; justify-content:center; border-radius:2px;\"><span style=\"font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#6B625A;\">Photo<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:32px; margin:0 0 4px;\">Pelumi Adese <span style=\"font-size:16px; color:#D89A2E; font-weight:600;\">Business Lead / COO<\u002Fspan><\u002Fh3>\n              <p style=\"font-size:15px; line-height:1.75; color:#B7AEA4; margin:16px 0 0;\">An experiential marketing and brand experience professional with over a decade of experience translating business strategy into immersive, high-impact brand engagements across Nigeria, the UK, and the wider African market. Her work bridges strategy and creativity to deliver experiences that resonate deeply — spanning FMCG, fintech, banking, and lifestyle, with brands including Midea, Visa, Reckitt Benckiser and Total.<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"position:relative; margin-bottom:28px;\">\n                <div style=\"position:absolute; left:-14px; top:14px; width:200px; height:230px; background:#5A2A17; border-radius:2px;\"><\u002Fdiv>\n                <div style=\"position:relative; width:220px; height:250px; background:#2E2A25; border:1px solid #3A342E; display:flex; align-items:center; justify-content:center; border-radius:2px;\"><span style=\"font-size:12px; letter-spacing:0.18em; text-transform:uppercase; color:#6B625A;\">Photo<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <h3 style=\"font-family:'Rokkitt'; font-weight:700; font-size:32px; margin:0 0 4px;\">Fetuga S.O <span style=\"font-size:16px; color:#D89A2E; font-weight:600;\">Project Manager<\u002Fspan><\u002Fh3>\n              <p style=\"font-size:15px; line-height:1.75; color:#B7AEA4; margin:16px 0 0;\">A results-driven Project Manager with a proven track record across brand strategy, experiential marketing, and end-to-end delivery. He brings a rare combination of strategic clarity and operational precision, leading cross-functional teams under pressure. His portfolio spans iconic brands including British American Tobacco, MTN, Procter &amp; Gamble, Guinness, Coca-Cola, Diageo and Spotify.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- CTA -->\n      <section style=\"background:#F0EBE3; padding:clamp(80px,10vw,120px) 40px; text-align:center;\">\n        <div style=\"max-width:820px; margin:0 auto;\">\n          <h2 style=\"font-family:'Rokkitt'; font-weight:800; font-size:clamp(40px,6vw,80px); line-height:0.98; letter-spacing:-0.01em; margin:0 0 26px; color:#201D1B;\">Ready to be felt, not just seen?<\u002Fh2>\n          <a href=\"#\" onclick=\"{{ goContact }}\" style=\"display:inline-block; font-size:16px; font-weight:700; color:#201D1B; background:#D89A2E; padding:18px 40px; border-radius:2px;\">Schedule a Chat<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ==================== SERVICES ==================== -->\n    <sc-if value=\"{{ isServices }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n\n      <section style=\"max-width:1240px; margin:0 auto; padding:clamp(70px,9vw,120px) 40px clamp(40px,5vw,70px);\">\n        <span style=\"display:block; font-size:13px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#B87D1E; margin-bottom:26px;\">Our Services<\u002Fspan>\n        <p style=\"font-family:'Rokkitt'; font-style:italic; font-weight:600; font-size:clamp(28px,4.2vw,52px); line-height:1.16; letter-spacing:-0.01em; color:#D89A2E; max-width:1000px; margin:0;\"><span style=\"color:#201D1B; font-style:normal;\">Our capabilities span the full spectrum of experiential marketing.<\u002Fspan> Every service works independently or as part of a fully integrated campaign strategy.<\u002Fp>\n      <\u002Fsection>\n\n      <section style=\"max-width:1240px; margin:0 auto; padding:0 40px clamp(80px,10vw,120px); disp tyle=\"padding-top:26px; border-top:1px solid #DDD4C7;\">\n            <p style=\"font-family:'Rokkitt'; font-style:italic; font-weight:600; font-size:22px; line-height:1.4; color:#D89A2E; margin:0;\">We create moments people don't just attend; they remember.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fsection>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- ============ FOOTER ============ -->\n  <footer style=\"background:#201D1B; color:#C9C0B6; padding:70px 0 40px;\">\n    <div style=\"max-width:1240px; margin:0 auto; padding:0 40px;\">\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:44px; padding-bottom:54px; border-bottom:1px solid #3A342E;\">\n        <div>\n          <div style=\"display:inline-flex; align-items:center; font-family:'Mulish'; font-weight:800; font-size:24px; letter-spacing:0.04em; color:#FAF7F2; margin-bottom:18px;\">CRED<span style=\"display:inline-flex; flex-direction:column; align-items:center; margin:0 2px;\"><span style=\"width:15px;height:15px;border-radius:50%;background:#D89A2E;\"><\u002Fspan><span style=\"width:17px;height:3px;background:#D89A2E;margin-top:2px;border-radius:2px;\"><\u002Fspan><\u002Fspan>M<\u002Fdiv>\n          <p style=\"font-family:'Rokkitt'; font-weight:500; font-size:19px; line-height:1.4; color:#8A8079; max-width:280px; margin:0;\">We create moments people don't just attend; they remember.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span style=\"display:block; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#D89A2E; margin-bottom:18px;\">Explore<\u002Fspan>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <a href=\"#\" onclick=\"{{ goHome }}\" style=\"font-size:15px; color:#C9C0B6;\">Home<\u002Fa>\n            <a href=\"#\" onclick=\"{{ goAbout }}\" style=\"font-size:15px; color:#C9C0B6;\">About<\u002Fa>\n            <a href=\"#\" onclick=\"{{ goServices }}\" style=\"font-size:15px; color:#C9C0B6;\">Services<\u002Fa>\n            <a href=\"#\" onclick=\"{{ goContact }}\" style=\"font-size:15px; color:#C9C0B6;\">Contact<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <span style=\"display:block; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#D89A2E; margin-bottom:18px;\">Visit<\u002Fspan>\n          <p style=\"font-size:15px; line-height:1.7; color:#C9C0B6; margin:0;\">3 Jakande Crescent,<br>Victoria Island,<br>Lagos, Nigeria.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <span style=\"display:block; font-size:12px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:#D89A2E; margin-bottom:18px;\">Connect<\u002Fspan>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <a href=\"mailto:hello@credomlimited.com\" style=\"font-size:15px; color:#C9C0B6;\">hello@credomlimited.com<\u002Fa>\n            <a href=\"#\" onclick=\"{{ goContact }}\" style=\"font-size:15px; font-weight:700; color:#D89A2E;\">Schedule a Chat →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding-top:26px; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;\">\n        <span style=\"font-size:13px; color:#6B625A;\">© 2026 CREDOM Limited. All rights reserved.<\u002Fspan>\n        <span style=\"font-size:13px; color:#6B625A;\">Redefining brand impact in Africa.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { page: 'home', sent: false };\n  constructor(props) {\n    super(props);\n    this.formRef = React.createRef();\n  }\n  go(p) {\n    this.setState({ page: p, sent: false });\n    if (typeof window !== 'undefined') window.scrollTo({ top: 0, behavior: 'smooth' });\n  }\n  submit(e) {\n    e.preventDefault();\n    const f = this.formRef.current;\n    if (!f) return;\n    const d = new FormData(f);\n    const name = (d.get('name') || '').toString();\n    const email = (d.get('email') || '').toString();\n    const company = (d.get('company') || '').toString();\n    const service = (d.get('service') || '').toString();\n    const message = (d.get('message') || '').toString();\n    const subject = encodeURIComponent('Schedule a Chat — ' + (name || 'New enquiry'));\n    const body = encodeURIComponent(\n      'Name: ' + name + '\\nEmail: ' + email + '\\nCompany: ' + company +\n      '\\nInterested in: ' + service + '\\n\\n' + message\n    );\n    if (typeof window !== 'undefined') {\n      window.location.href = 'mailto:ifeoluwaadese@gmail.com?subject=' + subject + '&body=' + body;\n    }\n    this.setState({ sent: true });\n  }\n  renderVals() {\n    const p = this.state.page;\n    return {\n      page: p, sent: this.state.sent,\n      isHome: p === 'home', isAbout: p === 'about', isServices: p === 'services', isContact: p === 'contact',\n      goHome: () => this.go('home'),\n      goAbout: () => this.go('about'),\n      goServices: () => this.go('services'),\n      goContact: () => this.go('contact'),\n      formRef: this.formRef,\n      onSubmit: (e) => this.submit(e),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
